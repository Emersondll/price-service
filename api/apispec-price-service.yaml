        - Prices API
      summary: Retrieves prices by customer ID. Taxes are not included
      operationId: get_1
      parameters:
        - name: accountId
          in: query
          description: AccountID for filtering by account
          required: true
          schema:
            type: string
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID
          required: true
          schema:
            type: string
        - name: skus
          in: query
          description: 'Set of SKUs to filter e.g: ?skus=SKU0001,SKU0002,SKU0003,..N'
          required: false
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          description: The page selected
          required: false
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          description: The quantity of how many items per page
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponseVo'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponseVo'
        '400':
          description: Resource is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Accessing the resource you were trying to reach is forbidden
