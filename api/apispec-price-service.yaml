          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '503':
          description: Service Unavailable. This error can be a result of queue not available. In this case, nothing will be processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      security:
        - Authorization: []
    delete:
      tags:
        - Prices V3
      summary: Price Deletion
      description: Delete price information for specific customers by SKU.
      operationId: deletePricesV3
