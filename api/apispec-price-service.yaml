        - name: vendorItemIds
          in: query
          description: Vendor Item ID for filtering by vendor account item
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerProductPriceResponseVo'
        '400':
          description: Resource is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Accessing the resource you were trying to reach is forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Not found
          content:
