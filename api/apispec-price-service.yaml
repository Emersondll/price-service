          required: true
          schema:
            type: string
        - name: parentRequestTraceId
          in: header
          description: Parent Cross transaction unique ID. Used to track the request from Bees Sync.
          required: false
          schema:
            type: string
        - name: vendorId
          in: header
          description: Field where the vendorId must be informed when it is not possible to send the token
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletePricesVoV3'
        required: true
      responses:
        '202':
          description: Accept
        '400':
          description: Bad Request
