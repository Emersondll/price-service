components:
  schemas:
    MessageResponse:
      required:
        - code
        - message
      type: object
      properties:
        code:
          type: integer
          description: Code of response
          format: int32
        message:
          type: string
          description: Message of response
        details:
          type: array
          description: Details of response
          items:
            type: string
            description: Detail
    ChargeResponseVoV3:
      required:
        - chargeId
        - type
        - value
      type: object
      properties:
        chargeId:
          type: string
          description: The charge alphanumeric identifier
          example: LOGISTIC_COST
        type:
          type: string
          description: The charge type represents the way it's going to be calculated. It can be percent or cash
          example: $ or %
        value:
          type: number
          description: The value of the charge. Its application depends on the type and it is a financial value with the max number of decimal places as 15
          example: 20.99
        base:
          type: number
          description: The base replaces the base price of the sku in the charge calculation. It is a financial value with the max number of decimal places as 15
          example: 10.99
      description: ChargeResponseVoV3
    PriceResponseVoV3:
      required:
        - basePrice
        - vendorItemId
      type: object
      properties:
        vendorItemId:
          type: string
          description: The vendor item identifier. It can have special characters
          example: SKU0001-CASE
        sku:
          type: string
          description: The sku alphanumeric identifier. It can have special characters but not dot
          example: SKU0001
        itemId:
          type: string
          description: The unique identifier of the Item
          example: VkVORE9SX0lEO0lURU1fSUQ=
        contractId:
          type: string
          description: The identifier of the Vendor and Account
          example: VkVORE9SX0lEO0NPTlRSQUNUX0lE
        deliveryCenterId:
          type: string
          description: The identifier of the Vendor´s Delivery Center
          example: VkVORE9SX0lEO0RFTElWRVJZX0NFTlRFUl9JRA==
        basePrice:
          type: number
          description: The base price for the current sku represented by a financial amount. The max number of decimal places is 15
          example: 20.99
        minimumPrice:
          type: number
          description: The minimum price for the current sku represented by a financial amount. The max number of decimal places is 15
          example: 5.99
        measureUnit:
          type: string
          description: The measure unit for the current sku
          example: CS
        type:
          type: string
          description: The type of the price measure unit
          example: PER_UNIT or PER_UOM
        deposit:
          type: number
          description: The deposit represents the can/cask price. It's represented by a financial amount and the max number of decimal places is 15
          example: 3.99
        consignment:
          type: number
          description: The deposit fee for kegs.
          example: 0.75
        quantityPerPallet:
          type: integer
          description: The quantity of the current sku that fit in a pallet. Used for the calculations of pallet deals
          format: int32
          example: 88
        suggestedRetailPrice:
          type: number
          description: The suggested sales price for the POC applies to the final consumer, also known as PTC. The zone or partner define/ingest it and the Pricing ms´s doesn´t make any calculation. It´s also used to calculate the profitMargin parameter
          example: 39.99
        timezone:
          type: string
          description: A geographic region within which the same standard time is used.
          example: America/Los_Angeles
        validFrom:
          type: string
          description: The valid from date on format 'yyyy-MM-dd'. Indicates when this price starts to be used in the calculation process.
          example: '2020-12-31'
        taxes:
          type: array
          description: List of taxes
          items:
            $ref: '#/components/schemas/TaxResponseVoV3'
        promotionalPrice:
          $ref: '#/components/schemas/PromotionalPriceResponseVoV3'
        charges:
          type: array
          description: List of charges
          items:
            $ref: '#/components/schemas/ChargeResponseVoV3'
    PromotionalPriceResponseVoV3:
      type: object
      properties:
        price:
          type: number
          description: The value for the promotional price which is represented by a financial amount with the max number of decimal places as 15
          example: 10.99
        externalId:
          type: string
          description: External Id for promotional price which is represented by an alphanumeric identifier
          example: ZTPM
        validUntil:
          type: string
          description: String to inform the expiration promotion date on format 'yyyy-MM-dd'.
          example: '2021-12-31'
      description: The promotional price
    TaxAmountResponseVoV3:
      type: object
      properties:
        taxId:
          type: string
          description: The id of the tax that is in the condition
          example: IVA
        threshold:
          type: number
          description: The value that will be used to compare the sum of the given tax id
          example: 1000
        scope:
          type: string
          description: Level which the Amount of tax will be compared to the threshold
          example: ORDER
        operator:
          type: string
          description: This is the operator indicating the type of comparison that is necessary to be done between scope and threshold
          example: GE
      description: The tax amount condition for the order
    TaxBaseChangesCompareWithResponseVoV3:
      required:
        - base
        - type
      type: object
      properties:
        type:
          type: string
          description: If it is an amount per unit of measurement or per item.
          example: $
        base:
          type: number
          description: The value of the base to be compared against the original tax base.
          example: 5.99
      description: In case vendors want to compare tax bases before applying the tax percentage.
    TaxBaseChangesResponseVoV3:
