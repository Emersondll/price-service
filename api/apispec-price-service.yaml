openapi: 3.0.3
info:
  title: AB-Inbev B2B Pricing Conditions Service
  description: '"REST API for AB-Inbev Pricing Conditions Service Microservice"'
  license:
    name: Anheuser-Busch InBev © 2023
  version: '3.0'
servers:
  - url: https://services-uat.bees-platform.dev/api
paths:
  /price-service/v3:
    post:
      tags:
        - Prices API
      summary: Retrieves prices by customer ID. Taxes are not included
      operationId: getPricesV3
      parameters:
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID
          required: true
          schema:
            type: string
        - name: ignoreValidFrom
          in: query
          description: Filter to ignore field validFrom, if true it will return future prices
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PriceRequestV3'
        required: true
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceResponseVoV3'
        '204':
          description: No Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Resource is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Accessing the resource you were trying to reach is forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '405':
          description: Method Not Allowed
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '503':
          description: Service Unavailable. Please contact system administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      security:
        - Authorization: []
  /price-service/v2:
    get:
      tags:
        - Prices API
      summary: Retrieves prices by customer ID. Taxes are not included
      operationId: get
      parameters:
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
        - name: vendorId
          in: header
          description: Vendor ID for filtering by vendor
          required: true
          schema:
            type: string
        - name: vendorAccountId
          in: header
          description: Vendor Account ID for filtering by vendor account
          required: true
          schema:
            type: string
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID
          required: true
          schema:
            type: string
        - name: priceListId
          in: header
          description: PRICE LIST ID for filtering by price list
          required: false
          schema:
            type: string
        - name: vendorItemIds
          in: query
          description: Vendor Item ID for filtering by vendor account item
          required: false
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          description: The page selected
          required: false
          schema:
            type: integer
            format: int32
        - name: size
          in: query
          description: The quantity of how many items per page
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponseVoV2'
        '400':
          description: Resource is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          description: Accessing the resource you were trying to reach is forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '405':
          description: Method Not Allowed
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Internal Server Error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '503':
          description: Service Unavailable. Please contact system administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      security:
        - Authorization: []
  /price-service/v1:
