        '503':
          description: Service Unavailable. Please contact system administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      security:
        - Authorization: []
  /price-relay/v3:
    put:
      tags:
        - Prices V3
      summary: Group Pricing Creation
      description: Create prices for multiple customers.
      operationId: createPrices
      parameters:
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
        - name: x-timestamp
          in: header
          required: true
          schema:
            type: string
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID. Used to track the request across systems.
          required: true
          schema:
            type: string
        - name: parentRequestTraceId
          in: header
          description: Parent Cross transaction unique ID. Used to track the request from Bees Sync.
          required: false
          schema:
            type: string
        - name: timezone
          in: header
          required: true
          schema:
            type: string
          example: America/Los_Angeles
        - name: vendorId
          in: header
          description: Field where the vendorId must be informed when it is not possible to send the token
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PricesPerIdsVoV3'
        required: true
      responses:
        '202':
          description: Accept
        '400':
          description: Bad Request
          content:
            application/json:
